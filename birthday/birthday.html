<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="birthday.css" />
</head>

<body>
  <div class="rs-window">
    <div class="rs-title-bar">
      <span>✨ Special Event ✨</span>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="rs-body">

      <div class="hero">
        <span class="pixel-cake">🎂</span>
        <h1>Happy Birthday!</h1>
        <div class="level-up">▲ You have gained a level! ▲</div>
      </div>

      <div class="sparkles">✦ ✧ ✦ ✧ ✦</div>

      <div class="rs-divider"><span>⚔</span></div>

      <div class="poem-box">
        <h2>How We Met</h2>
        <p>Write your story here.<br>
          Keep going on a new line.<br>
          <em>This part will show up in gold.</em>
        </p>
      </div>

      <div class="rs-divider"><span>⚔</span></div>

      <div class="poem-box">
        <h2>My Favourite Thing About You</h2>
        <p>Another card here.</p>
      </div>

      <div class="rs-footer">Made with ❤️</div>
    </div>
  </div>
</body>

</html>
